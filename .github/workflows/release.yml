name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package extension
        run: |
          zip -r selection-translator.zip . \
            -x ".git/*" ".github/*" "*.zip" "README.md" "CHANGELOG.md" "LICENSE" ".gitignore"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: selection-translator.zip
          generate_release_notes: true
          body_path: CHANGELOG.md
